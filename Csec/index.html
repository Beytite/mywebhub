<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國泰證券 - 邀請卡貴賓填寫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background-color: #f3f4f6;
        }
        /* 隱藏原始圖片，只用於 Canvas 繪製 */
        #sourceImage {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <div class="max-w-6xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- 標題區塊 -->
        <div class="bg-[#00a854] text-white p-6 text-center">
            <h1 class="text-2xl md:text-3xl font-bold tracking-wider">國泰證券 左營簡易分公司</h1>
            <p class="text-green-100 mt-2">貴賓專屬邀請卡產生器</p>
        </div>

        <!-- 主要內容區塊 -->
        <div class="flex flex-col md:flex-row p-6 md:p-10 gap-8">
            
            <!-- 左側：輸入表單 -->
            <div class="w-full md:w-1/3 flex flex-col gap-6">
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200 shadow-sm">
                    <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">填寫貴賓資訊</h2>
                    
                    <div class="mb-5">
                        <label for="guestName" class="block text-sm font-medium text-gray-700 mb-1">貴賓姓名 (最多4字)</label>
                        <input type="text" id="guestName" maxlength="4" placeholder="例如：王曉明" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#00a854] focus:border-[#00a854] outline-none transition-all">
                    </div>
                    
                    <div class="mb-6">
                        <label for="guestTitle" class="block text-sm font-medium text-gray-700 mb-1">稱謂 (最多3字)</label>
                        <input type="text" id="guestTitle" maxlength="3" placeholder="例如：董事長" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#00a854] focus:border-[#00a854] outline-none transition-all">
                    </div>

                    <div class="flex flex-col gap-3">
                        <button id="previewBtn" class="w-full bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center gap-2 shadow-md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            預覽邀請卡
                        </button>
                        
                        <button id="downloadBtn" class="w-full bg-[#00a854] hover:bg-[#008c46] text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center gap-2 shadow-md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                            </svg>
                            下載圖片 (PNG)
                        </button>
                    </div>
                </div>
                
                <div class="text-sm text-gray-500 bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <p>💡 <strong>提示：</strong> 輸入完成後請點擊「預覽邀請卡」，確認畫面無誤後再點擊「下載圖片」。文字會自動調整大小以符合版面。</p>
                </div>
            </div>

            <!-- 右側：預覽畫布 -->
            <div class="w-full md:w-2/3 flex flex-col items-center justify-center bg-gray-100 rounded-xl border border-gray-200 overflow-hidden relative min-h-[300px]">
                <!-- 載入中提示 -->
                <div id="loadingMsg" class="absolute inset-0 flex items-center justify-center bg-gray-100 z-10 w-full h-full">
                    <span class="text-gray-500 font-medium animate-pulse">載入底圖中...</span>
                </div>
                
                <!-- 圖片原始檔 (隱藏) - 加上明確的相對路徑 ./ -->
                <img id="sourceImage" src="card.png" alt="card" crossorigin="anonymous">
                
                <!-- 繪製用的 Canvas -->
                <canvas id="previewCanvas" class="max-w-full h-auto shadow-md"></canvas>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('previewCanvas');
            const ctx = canvas.getContext('2d');
            const sourceImage = document.getElementById('sourceImage');
            const nameInput = document.getElementById('guestName');
            const titleInput = document.getElementById('guestTitle');
            const previewBtn = document.getElementById('previewBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const loadingMsg = document.getElementById('loadingMsg');

            let isImageLoaded = false;

            // 當圖片載入完成時初始化畫布
            sourceImage.onload = () => {
                isImageLoaded = true;
                loadingMsg.style.display = 'none';
                // 設定 Canvas 實際尺寸為圖片的真實解析度，保證下載畫質
                canvas.width = sourceImage.naturalWidth;
                canvas.height = sourceImage.naturalHeight;
                drawCanvas();
            };

            // 如果圖片有快取，可能已經載入完成了
            if (sourceImage.complete && sourceImage.naturalHeight !== 0) {
                sourceImage.onload();
            }

            // 圖片載入失敗處理 (加入手動上傳備用方案)
            sourceImage.onerror = () => {
                loadingMsg.innerHTML = `
                    <div class="text-red-500 text-center px-6 py-8 flex flex-col items-center gap-3 bg-white rounded-lg shadow-sm border border-red-100 m-4">
                        <p class="font-bold text-lg">找不到預設背景圖片 ❌</p>
                        <p class="text-sm text-gray-600 mb-2">無法在伺服器上找到 <b>image/card.png</b>。<br>GitHub 有嚴格的「大小寫」區分，且您的檔案可能是 <b>.jpg</b> 結尾。</p>
                        
                        <div class="w-full bg-green-50 p-4 rounded-lg border border-green-200 mt-2">
                            <p class="text-sm text-green-800 font-medium mb-3">您現在可以直接手動選擇您的卡片底圖：</p>
                            <label class="cursor-pointer inline-flex justify-center items-center bg-[#00a854] hover:bg-[#008c46] text-white font-bold py-2 px-6 rounded-lg shadow transition-colors w-full">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                </svg>
                                點此上傳圖片
                                <input type="file" id="localFallbackUpload" class="hidden" accept="image/*">
                            </label>
                        </div>
                    </div>
                `;

                // 綁定手動上傳按鈕的事件
                const uploadInput = document.getElementById('localFallbackUpload');
                if (uploadInput) {
                    uploadInput.addEventListener('change', (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            loadingMsg.innerHTML = '<span class="text-gray-500 font-medium animate-pulse">處理上傳圖片中...</span>';
                            const reader = new FileReader();
                            reader.onload = (event) => {
                                // 將上傳的圖片轉為 Data URL 後重新餵給 sourceImage
                                sourceImage.src = event.target.result; 
                                // sourceImage 的 onload 事件會自動接手後續的畫布繪製
                            };
                            reader.readAsDataURL(file);
                        }
                    });
                }
            };

            // 繪製合成圖片的核心函數
            function drawCanvas() {
                if (!isImageLoaded) return;

                // 1. 清除並畫上原始card
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(sourceImage, 0, 0, canvas.width, canvas.height);

                const nameText = nameInput.value.trim();
                const titleText = titleInput.value.trim();

                if (!nameText && !titleText) return;

                // --- 2. 設定繪製座標參數 (使用相對比例以適應不同解析度) ---
                // 將整體 X 座標往右移 (原為0.685 -> 改為0.705)，避免蓋到「誠摯邀請」
                const gapStartX = canvas.width * 0.705; 
                const gapEndX = canvas.width * 0.875; // 同步稍微往右推
                const textY = canvas.height * 0.268;    
                
                const maxAllowedWidth = gapEndX - gapStartX; // 允許的最大文字寬度

                // 設定姓名「固定 75pt」大小
                const nameFontString = 'bold 75pt "Noto Sans TC", "Microsoft JhengHei", sans-serif';
                // 設定職稱的基礎字體大小 (相對圖片高度)
                const baseTitleFontSize = canvas.height * 0.035; 

                ctx.textBaseline = 'alphabetic';

                // 字體設定字串函數 (專門用於職稱的縮放)
                const getTitleFontString = (scale) => `bold ${baseTitleFontSize * scale}px "Noto Sans TC", "Microsoft JhengHei", sans-serif`;

                // --- 3. 動態計算縮放比例 (只縮小職稱) ---
                const safeMaxWidth = maxAllowedWidth * 0.95; // 安全可用寬度
                let titleScale = 1.0;
                const minScale = 0.3; // 最小縮放限制

                // 先計算姓名固定大小 (75pt) 時佔用的寬度
                ctx.font = nameFontString;
                const finalNameWidth = nameText ? ctx.measureText(nameText).width : 0;
                
                // 設定姓名與稱謂之間的間距
                const gapWidth = (nameText && titleText) ? (canvas.width * 0.005) : 0;

                // 計算職稱可用的「剩餘」寬度
                const remainingTitleWidth = safeMaxWidth - finalNameWidth - gapWidth;

                // 取得職稱在 100% 比例時的原始寬度
                ctx.font = getTitleFontString(1.0);
                const rawTitleWidth = titleText ? ctx.measureText(titleText).width : 0;

                // 如果職稱原始寬度超過剩餘的空間，才等比例縮小職稱
                if (titleText && rawTitleWidth > remainingTitleWidth) {
                    titleScale = remainingTitleWidth / rawTitleWidth;
                    // 若縮小比例過低，則鎖在最低下限，避免字太小看不見
                    if (titleScale < minScale) {
                        titleScale = minScale; 
                    }
                }

                // --- 4. 開始繪製文字 ---
                // 計算實際套用縮放後的職稱渲染寬度
                ctx.font = getTitleFontString(titleScale);
                const finalTitleWidth = titleText ? ctx.measureText(titleText).width : 0;
                
                const totalRenderWidth = finalNameWidth + finalTitleWidth + gapWidth;
                
                // 計算起始 X 座標 (將整體文字區塊在可用空間內「置中對齊」)
                let startX = gapStartX + (maxAllowedWidth - totalRenderWidth) / 2;

                // 畫姓名 (固定100pt、不縮放)
                if (nameText) {
                    ctx.font = nameFontString;
                    ctx.fillStyle = '#EBCD85'; // 指定顏色
                    ctx.fillText(nameText, startX, textY);
                    startX += finalNameWidth + gapWidth; // 游標向右移
                }

                // 畫稱謂 (會依剩餘空間等比例縮小)
                if (titleText) {
                    ctx.font = getTitleFontString(titleScale);
                    ctx.fillStyle = '#EBCD85'; // 指定顏色
                    ctx.fillText(titleText, startX, textY);
                }
            }

            // 綁定事件 - 僅保留點擊預覽按鈕時觸發
            previewBtn.addEventListener('click', drawCanvas);
            
            // 下載功能
            downloadBtn.addEventListener('click', () => {
                if (!isImageLoaded) {
                    alert('圖片尚未載入完成或未上傳，請稍候。');
                    return;
                }
                
                const name = nameInput.value.trim() || '貴賓';
                const dataURL = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `左營分公司邀請卡_${name}.png`;
                link.href = dataURL;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        });
    </script>
</body>
</html>
